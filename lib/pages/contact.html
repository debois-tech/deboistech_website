<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — deboistech</title>
    <meta name="description" content="Get in touch with deboistech. Let's discuss your project." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../../images/favicon.png" />
    <link rel="stylesheet" href="../../css/output.css" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <main class="pt-20">
      <section class="px-4 py-20 sm:px-6 sm:py-28 lg:px-8">
        <div class="mx-auto max-w-7xl">
          <div id="contact-page-content">
            <div class="mx-auto max-w-2xl text-center">
              <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-5xl">Contact Us</h1>
              <p class="mt-4 text-lg text-gray-600">Have a project in mind? We'd love to hear from you.</p>
            </div>
            <div class="mx-auto mt-16 max-w-xl">
              <form id="contact-form" action="https://api.web3forms.com/submit" method="POST" class="space-y-6">
                <input type="hidden" name="access_key" value="5ca0ca8c-48f2-4d5c-bba1-1e48a914927e">
                <input type="hidden" name="subject" value="New enquiry from deboistech contact page!">
                <input type="checkbox" name="botcheck" class="hidden" style="display:none">
                <div>
                  <label for="name" class="block text-sm font-medium text-gray-900">Name</label>
                  <input type="text" name="name" required class="mt-2 block w-full rounded-lg border border-gray-300 px-4 py-3 text-sm text-gray-900 placeholder-gray-500 focus:border-primary-500 focus:ring-primary-500" placeholder="Your name" />
                </div>
                <div>
                  <label for="email" class="block text-sm font-medium text-gray-900">Email</label>
                  <input type="email" name="email" required class="mt-2 block w-full rounded-lg border border-gray-300 px-4 py-3 text-sm text-gray-900 placeholder-gray-500 focus:border-primary-500 focus:ring-primary-500" placeholder="you@example.com" />
                </div>
                <div>
                  <label for="message" class="block text-sm font-medium text-gray-900">Message</label>
                  <textarea name="message" rows="5" required class="mt-2 block w-full rounded-lg border border-gray-300 px-4 py-3 text-sm text-gray-900 placeholder-gray-500 focus:border-primary-500 focus:ring-primary-500" placeholder="Tell us about your project..."></textarea>
                </div>
                <button type="submit" class="btn-primary w-full">Send Message</button>
              </form>
              <div class="mt-12 text-center">
                <p class="text-sm text-gray-600">Or reach us directly:</p>
                <p class="mt-2 text-sm text-gray-900">connect@deboistech.in</p>
                <p class="text-sm text-gray-900">+91 76206 71012</p>
              </div>
            </div>
          </div>
          <div id="form-success" class="hidden py-20 text-center">
            <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-green-100">
              <svg class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
            </div>
            <h2 class="mt-6 text-3xl font-bold text-gray-900">Message Sent!</h2>
            <p class="mt-3 text-lg text-gray-500">Thank you for reaching out.<br>We'll get back to you within 24 hours.</p>
            <a href="../../index.html" class="btn-secondary mt-8 inline-flex">Go Back to Home</a>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-root"></div>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
    (function() {
      var form = document.getElementById("contact-form");
      var content = document.getElementById("contact-page-content");
      var success = document.getElementById("form-success");
      if (!form || !content || !success) return;
      form.addEventListener("submit", async function(e) {
        e.preventDefault();
        var data = new FormData(form);
        try {
          var res = await fetch(form.action, { method: "POST", body: data });
          if (res.ok) {
            content.classList.add("hidden");
            success.classList.remove("hidden");
          } else {
            alert("Something went wrong. Please try again.");
          }
        } catch (_) {
          alert("Something went wrong. Please try again.");
        }
      });
    })();
    </script>
  </body>
</html>
